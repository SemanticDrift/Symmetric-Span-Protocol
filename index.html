<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SSP LOGIC ENGINE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            background: #d4d4d4;
            color: #222;
        }
        #left-pane {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #bbb;
            padding: 20px;
            background: #d4d4d4;
            position: relative;
        }
        #right-pane {
            flex: 1;
            padding: 28px 22px;
            background: #c8c8c8;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }
        h1 {
            font-size: 15px;
            letter-spacing: 3px;
            color: #111;
            margin-bottom: 14px;
            text-align: center;
        }
        canvas {
            border: 1px solid #999;
            background: #111;
            max-width: 100%;
        }
        .delta-display {
            margin-top: 16px;
            font-size: 22px;
            font-weight: bold;
            color: #111;
            text-align: center;
            letter-spacing: 1px;
            min-height: 30px;
        }
        .triangle-name {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            margin-top: 6px;
            letter-spacing: 2px;
            min-height: 22px;
        }
        .green  { color: #1a7a1a; }
        .orange { color: #bb5500; }
        .blue   { color: #1144bb; }
        .red    { color: #cc0000; }

        h2 {
            font-size: 12px;
            letter-spacing: 2px;
            color: #333;
            margin-bottom: 6px;
        }
        label {
            font-size: 11px;
            color: #555;
            margin-top: 8px;
            display: block;
        }
        input {
            padding: 9px 10px;
            background: #ebebeb;
            border: 1px solid #aaa;
            color: #111;
            font-size: 15px;
            border-radius: 3px;
            width: 100%;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
        input:focus { outline: none; border-color: #888; }

        .logic-key {
            margin-top: 14px;
            border-top: 1px solid #aaa;
            padding-top: 12px;
            font-size: 12px;
            color: #444;
            line-height: 2.1;
        }
        .logic-key .key-title {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #333;
            margin-bottom: 4px;
        }
        .watermark {
            position: absolute;
            bottom: 12px;
            left: 16px;
            font-size: 11px;
            color: #aaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="left-pane">
    <h1>SSP LOGIC ENGINE</h1>
    <canvas id="sspCanvas" width="520" height="340"></canvas>
    <div class="delta-display">
        &Delta; = <span id="deltaVal"></span>
    </div>
    <div class="triangle-name" id="typeName"></div>
    <div class="watermark">SemanticShift.net</div>
</div>

<div id="right-pane">
    <h2>VARIABLES</h2>

    <label>a = Anchor</label>
    <input type="number" id="input_a" step="1" min="1" placeholder="a">

    <label>b = Centroid</label>
    <input type="number" id="input_b" step="1" min="1" placeholder="b">

    <label>c = Span</label>
    <input type="number" id="input_c" step="1" min="1" placeholder="c">

    <label>d = Boundary</label>
    <input type="number" id="input_d" step="1" min="1" placeholder="d">

    <div class="logic-key">
        <div class="key-title">Logic Key</div>
        a &lt; d<br>
        a = b - (c / 2)<br>
        b = (a + d) / 2<br>
        c = d - a<br>
        d = b + (c / 2)
    </div>
</div>

<script>
    const fieldIds = ['input_a', 'input_b', 'input_c', 'input_d'];

    fieldIds.forEach(id => {
        document.getElementById(id).addEventListener('input', solveAndDraw);
    });

    function fmt(n) {
        if (n === null || n === undefined || isNaN(n)) return '';
        if (Number.isInteger(n)) return String(n);
        const r = parseFloat(n.toFixed(4));
        return Number.isInteger(r) ? String(r) : r.toString();
    }

    function setDerived(id, val) {
        document.getElementById(id).value = fmt(val);
    }

    function getRaw(id) {
        const v = parseFloat(document.getElementById(id).value);
        return isNaN(v) ? null : v;
    }

    function showError() {
        document.getElementById('deltaVal').innerHTML =
            '<span class="red">ERROR</span>';
        document.getElementById('typeName').innerText = '';
        clearCanvas();
    }

    function clearCanvas() {
        const ctx = document.getElementById('sspCanvas').getContext('2d');
        ctx.clearRect(0, 0, 520, 340);
    }

    function clearDisplay() {
        document.getElementById('deltaVal').innerText = '';
        document.getElementById('typeName').innerText = '';
        clearCanvas();
    }

    function isValid(a, b, c, d) {
        if (a <= 0 || b <= 0 || c <= 0 || d <= 0) return false;
        if (a >= d) return false;
        return true;
    }

    function solveAndDraw() {
        let a = getRaw('input_a');
        let b = getRaw('input_b');
        let c = getRaw('input_c');
        let d = getRaw('input_d');

        const filled = [a,b,c,d].filter(v => v !== null).length;
        if (filled < 2) { clearDisplay(); return; }

        // Derive from any valid pair — a,d is primary
        if (a !== null && d !== null) {
            b = (a + d) / 2;
            c = d - a;
            setDerived('input_b', b);
            setDerived('input_c', c);
        } else if (b !== null && c !== null) {
            a = b - c / 2;
            d = b + c / 2;
            setDerived('input_a', a);
            setDerived('input_d', d);
        } else if (a !== null && b !== null) {
            d = 2 * b - a;
            c = d - a;
            setDerived('input_d', d);
            setDerived('input_c', c);
        } else if (a !== null && c !== null) {
            d = a + c;
            b = (a + d) / 2;
            setDerived('input_d', d);
            setDerived('input_b', b);
        } else if (c !== null && d !== null) {
            a = d - c;
            b = (a + d) / 2;
            setDerived('input_a', a);
            setDerived('input_b', b);
        } else if (b !== null && d !== null) {
            a = 2 * b - d;
            c = d - a;
            setDerived('input_a', a);
            setDerived('input_c', c);
        } else {
            clearDisplay();
            return;
        }

        if (!isValid(a, b, c, d)) { showError(); return; }

        const delta = b*b + c*c - d*d;
        const deltaEl = document.getElementById('deltaVal');
        const typeEl = document.getElementById('typeName');

        deltaEl.innerText = fmt(delta);
        typeEl.className = 'triangle-name';

        const isLocked = Math.abs(delta) < 0.001;
        const isObtuse = delta < -0.001;

        if (isLocked) {
            typeEl.innerText = 'RECTANGULO';
            typeEl.classList.add('green');
        } else if (isObtuse) {
            typeEl.innerText = 'OBTUSANGULO';
            typeEl.classList.add('orange');
        } else {
            typeEl.innerText = 'ACUTANGULO';
            typeEl.classList.add('blue');
        }

        drawTriangle(b, c, d, delta, isLocked, isObtuse);
    }

    function drawTriangle(b, c, d, delta, isLocked, isObtuse) {
        const canvas = document.getElementById('sspCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        ctx.clearRect(0, 0, W, H);

        // Angle at vertex A (left base) between sides b and c, opposite d
        const cosA = (b*b + c*c - d*d) / (2*b*c);
        const sinA = Math.sqrt(Math.max(0, 1 - cosA*cosA));
        if (sinA < 0.0001) return;

        const margin = 60;
        const maxW = W - margin * 2;
        const maxH = H - margin - 40;
        const triH = b * sinA;
        const scale = Math.min(maxW / c, maxH / triH, 45);

        const baseLen = c * scale;
        const xA = (W - baseLen) / 2;
        const xD = xA + baseLen;
        const baseY = H - margin;

        // Apex using angle at A
        const apexX = xA + b * cosA * scale;
        const apexY = baseY - b * sinA * scale;

        const color = isLocked ? '#1a7a1a' : isObtuse ? '#bb5500' : '#1144bb';

        // Fill
        ctx.beginPath();
        ctx.moveTo(xA, baseY);
        ctx.lineTo(xD, baseY);
        ctx.lineTo(apexX, apexY);
        ctx.closePath();
        ctx.fillStyle = color + '25';
        ctx.fill();

        // Stroke
        ctx.beginPath();
        ctx.moveTo(xA, baseY);
        ctx.lineTo(xD, baseY);
        ctx.lineTo(apexX, apexY);
        ctx.closePath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Right angle box at the base left corner (xA, baseY)
        // This is where the 90 degree angle is for the 3-4-5 triangle
        if (isLocked) {
            const sz = 13;
            ctx.beginPath();
            ctx.moveTo(xA + sz, baseY);
            ctx.lineTo(xA + sz, baseY - sz);
            ctx.lineTo(xA, baseY - sz);
            ctx.strokeStyle = '#1a7a1a';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Vertex labels
        ctx.fillStyle = '#888';
        ctx.font = '12px sans-serif';
        ctx.fillText('a', xA - 14, baseY + 5);
        ctx.fillText('d', xD + 5, baseY + 5);

        // Side labels
        ctx.fillStyle = color;
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText('c = ' + fmt(c), (xA+xD)/2 - 18, baseY + 18);
        ctx.fillText('b = ' + fmt(b), (xA+apexX)/2 - 32, (baseY+apexY)/2 - 2);
        ctx.fillText('d = ' + fmt(d), (xD+apexX)/2 + 4, (baseY+apexY)/2 - 2);
    }
</script>

</body>
</html>
